services:
  postgres:
    image: postgres:16
    container_name: roombms-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1"
      POSTGRES_DB: mydb
    ports:
      - "5433:5432"
    volumes:
      - roombms_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  roombms_pgdata:
